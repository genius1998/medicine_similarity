<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>성분콕</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --ink: #222222;
      --muted: #666666;
      --line: #cfcfcf;
      --line-strong: #b8b8b8;
      --accent: #1f5b43;
      --warn-bg: #f6f1e4;
      --warn-line: #d8c9a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }
    .app-header {
      border-bottom: 1px solid var(--line-strong);
      background: #f0f2f1;
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 18px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: #173d2d;
    }
    .header-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 18px 32px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .alert-box {
      padding: 10px 12px;
      border: 1px solid var(--warn-line);
      border-radius: 4px;
      background: var(--warn-bg);
      color: #5f5644;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .section-box {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      padding: 12px;
    }
    .section-caption {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #dddddd;
    }
    .section-caption h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }
    .hint-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 4px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .field-full { grid-column: 1 / -1; }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #555;
    }
    input {
      width: 100%;
      border: 1px solid #bfc5c2;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      background: #fff;
    }
    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }
    .button,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #aab7b0;
      border-radius: 4px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .button {
      background: var(--accent);
      border-color: #1b503b;
      color: #fff;
    }
    .button-secondary {
      background: #f8f8f8;
      color: #222;
    }
    .form-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    @media (max-width: 760px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>성분콕</h1>
      <div class="header-desc">건강기능식품 추천 서비스</div>
    </div>
  </header>

  <div class="wrap">
    <a class="back-link" href="/">메인 화면으로</a>
    {% if error_message %}
    <div class="alert-box">{{ error_message }}</div>
    {% else %}
    <div class="alert-box">일반 사용자 계정을 생성합니다. 관리자 화면은 관리자 권한 계정으로만 접근할 수 있습니다.</div>
    {% endif %}

    <section class="section-box">
      <div class="section-caption">
        <h2>회원가입</h2>
        <div class="hint-text">서비스 계정 생성용 기본 화면</div>
      </div>
      <form method="post" action="/signup">
        <div class="form-grid">
          <div>
            <label for="name">이름</label>
            <input id="name" name="full_name" type="text" placeholder="이름 입력">
          </div>
          <div>
            <label for="org">소속</label>
            <input id="org" name="organization" type="text" placeholder="기관 또는 회사명">
          </div>
          <div class="field-full">
            <label for="email">이메일</label>
            <input id="email" name="email" type="email" placeholder="example@company.com" required>
          </div>
          <div>
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" placeholder="비밀번호 입력" required>
          </div>
          <div>
            <label for="passwordConfirm">비밀번호 확인</label>
            <input id="passwordConfirm" name="password_confirm" type="password" placeholder="비밀번호 재입력" required>
          </div>
        </div>
        <div class="button-row">
          <button class="button" type="submit">회원가입</button>
          <a class="button-secondary" href="/login">로그인 화면</a>
        </div>
      </form>
      <div class="form-note">회원가입 후 로그인 화면으로 이동합니다.</div>
    </section>
  </div>
</body>
</html>
