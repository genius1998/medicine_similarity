<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>성분콕</title>
  <link rel="icon" type="image/png" href="/static/assets/favicon.png?v=transparent-20260605">
  <link rel="apple-touch-icon" href="/static/assets/favicon.png?v=transparent-20260605">
  <link rel="stylesheet" href="/static/css/brand.css">
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --ink: #222222;
      --muted: #666666;
      --line: #cfcfcf;
      --line-strong: #b8b8b8;
      --accent: #1f5b43;
      --warn-bg: #f6f1e4;
      --warn-line: #d8c9a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }
    .app-header {
      border-bottom: 1px solid var(--line-strong);
      background: #fefefe;
    }
    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 12px 18px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: #173d2d;
    }
    .header-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 18px 32px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .alert-box {
      padding: 10px 12px;
      border: 1px solid var(--warn-line);
      border-radius: 4px;
      background: var(--warn-bg);
      color: #5f5644;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .section-box {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      padding: 12px;
    }
    .section-caption {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #dddddd;
    }
    .section-caption h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }
    .hint-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 4px;
    }
    .form-grid {
      display: grid;
      gap: 10px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #555;
    }
    input {
      width: 100%;
      border: 1px solid #bfc5c2;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      background: #fff;
    }
    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 4px;
    }
    .button,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #aab7b0;
      border-radius: 4px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .button {
      background: var(--accent);
      border-color: #1b503b;
      color: #fff;
    }
    .button-secondary {
      background: #f8f8f8;
      color: #222;
    }
    .form-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1 class="brand-title"><a class="brand-link" href="/home"><img class="brand-logo" src="/static/assets/logo.png" alt="성분콕"></a></h1>
      <div class="header-desc">건강기능식품 추천 서비스</div>
    </div>
  </header>

  <div class="wrap">
    <a class="back-link" href="/">메인 화면으로</a>
    {% if error_message %}
    <div class="alert-box">{{ error_message }}</div>
    {% elif joined_message %}
    <div class="alert-box">{{ joined_message }}</div>
    {% else %}
    <div class="alert-box">관리자 계정은 배포 시 설정한 `config.json`의 auth 항목을 기준으로 생성됩니다.</div>
    {% endif %}

    <section class="section-box">
      <div class="section-caption">
        <h2>로그인</h2>
        <div class="hint-text">서비스 접근용 기본 로그인 화면</div>
      </div>
      <form class="form-grid" method="post" action="/login">
        <div>
          <label for="email">이메일</label>
          <input id="email" name="email" type="email" placeholder="example@company.com" required>
        </div>
        <div>
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" placeholder="비밀번호 입력" required>
        </div>
        <div class="button-row">
          <button class="button" type="submit">로그인</button>
          <a class="button-secondary" href="/signup">회원가입</a>
        </div>
      </form>
      <div class="form-note">로그인 후 OCR 기능 화면, 제품 목록 화면, 관리자 화면으로 이동할 수 있습니다.</div>
    </section>
  </div>
</body>
</html>
