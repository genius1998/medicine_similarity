<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>성분콕</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --ink: #222222;
      --muted: #666666;
      --line: #cfcfcf;
      --line-strong: #b8b8b8;
      --accent: #1f5b43;
      --accent-soft: #edf4f0;
      --header-bg: #e7efe9;
      --warn-bg: #f6f1e4;
      --warn-line: #d8c9a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }
    .app-header {
      border-bottom: 1px solid var(--line-strong);
      background: #f0f2f1;
    }
    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 12px 18px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 700;
      color: #173d2d;
    }
    .header-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 12px 18px 32px;
    }
    .caution-banner {
      padding: 10px 12px;
      border: 1px solid var(--warn-line);
      border-radius: 4px;
      background: var(--warn-bg);
      color: #5f5644;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .section-box {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      padding: 12px;
      margin-bottom: 12px;
    }
    .section-caption {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #dddddd;
    }
    .section-caption h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }
    .hint-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input {
      flex: 1 1 320px;
      min-width: 220px;
      border: 1px solid #bfc5c2;
      border-radius: 4px;
      padding: 7px 8px;
      font-size: 13px;
      background: #fff;
    }
    button,
    .btn-link {
      border: 1px solid #aab7b0;
      border-radius: 4px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: #f8f8f8;
      color: #222;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent);
      border-color: #1b503b;
      color: #fff;
    }
    button[disabled] {
      background: #e3e3e3;
      color: #7a7a7a;
      border-color: #cccccc;
      cursor: not-allowed;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #d7d7d7;
      padding: 8px;
      vertical-align: top;
      text-align: left;
      font-size: 13px;
      word-break: break-word;
    }
    th {
      background: #f0f0f0;
      font-weight: 700;
      color: #333;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border: 1px solid #c9d8cf;
      border-radius: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      line-height: 1.4;
      white-space: nowrap;
    }
    .empty-panel {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      padding: 14px;
      border: 1px dashed #c9c9c9;
      border-radius: 4px;
      background: #fafafa;
    }
    .pager {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .page-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pager button.is-active {
      background: var(--accent);
      border-color: #1b503b;
      color: #fff;
    }
    .ellipsis { color: var(--muted); padding: 0 2px; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>성분콕</h1>
      <div class="header-desc">건강기능식품 추천 서비스. 기존 제품 DB를 기준으로 품목을 조회하고 상세 정보 및 유사 제품 추천으로 이동할 수 있습니다.</div>
    </div>
  </header>

  <div class="wrap">
    <div class="caution-banner">
      공공데이터 기반 품목 목록입니다. 품목명, 업체명, 품목제조번호로 검색할 수 있으며 상세 화면에서 성분 기반 유사 제품 비교를 확인할 수 있습니다.
    </div>

    <section class="section-box">
      <div class="section-caption">
        <div>
          <h2>품목 조회</h2>
          <div class="hint-text">목록에서 상세 조회를 누르면 제품 프로필과 유사 제품 TOP10을 확인할 수 있습니다.</div>
        </div>
      </div>
      <div class="toolbar">
        <input id="query" placeholder="품목명, 업체명, 품목제조번호로 검색">
        <button id="searchBtn" class="btn-primary" type="button">검색</button>
      </div>
    </section>

    <section class="section-box">
      <div class="section-caption">
        <div>
          <h2>조회 결과</h2>
          <div class="hint-text">대표 카테고리와 주요 기능성 원료를 기준으로 목록을 제공합니다.</div>
        </div>
      </div>
      <div class="meta-row">
        <div id="summary">로딩 중...</div>
        <div id="pageInfo"></div>
      </div>
      <div id="tableWrap"></div>
      <div class="pager">
        <button id="prevBtn" type="button">이전</button>
        <div id="pageButtons" class="page-buttons"></div>
        <button id="nextBtn" type="button">다음</button>
      </div>
    </section>
  </div>

  <script>
    const queryInput = document.getElementById("query");
    const summaryEl = document.getElementById("summary");
    const pageInfoEl = document.getElementById("pageInfo");
    const tableWrap = document.getElementById("tableWrap");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageButtonsEl = document.getElementById("pageButtons");

    let page = 1;
    const pageSize = 20;
    let currentQuery = "";
    let lastTotal = 0;

    async function loadProducts() {
      const params = new URLSearchParams({
        q: currentQuery,
        page: String(page),
        page_size: String(pageSize),
      });
      const res = await fetch(`/api/catalog/products?${params.toString()}`);
      const data = await res.json();

      lastTotal = data.total_count || 0;
      const totalPages = Math.max(1, Math.ceil(lastTotal / pageSize));

      summaryEl.textContent = `검색어: ${currentQuery || "전체"} / 전체 ${lastTotal.toLocaleString()}건`;
      pageInfoEl.textContent = `${data.page}페이지 / 전체 ${totalPages}페이지`;

      renderTable(data.results || []);
      renderPager(totalPages);
    }

    function renderTable(rows) {
      if (!rows.length) {
        tableWrap.innerHTML = '<div class="empty-panel">조회 결과가 없습니다.</div>';
        return;
      }

      const html = [
        '<div class="table-wrap"><table><thead><tr>',
        '<th>품목제조번호</th><th>품목명</th><th>업체명</th><th>대표 카테고리</th><th>주요 기능성원료</th><th>상세</th>',
        '</tr></thead><tbody>'
      ];

      for (const row of rows) {
        const primary = (row.primary_ingredients || []).slice(0, 3).join(", ");
        html.push("<tr>");
        html.push(`<td>${escapeHtml(row.report_no || "")}</td>`);
        html.push(`<td><strong>${escapeHtml(row.product_name || "")}</strong></td>`);
        html.push(`<td>${escapeHtml(row.company_name || "")}</td>`);
        html.push(`<td>${row.product_main_category ? `<span class="chip">${escapeHtml(row.product_main_category)}</span>` : "-"}</td>`);
        html.push(`<td>${escapeHtml(primary || "-")}</td>`);
        html.push(`<td><a class="btn-link btn-primary" href="/products/${encodeURIComponent(row.report_no)}">상세 조회</a></td>`);
        html.push("</tr>");
      }

      html.push("</tbody></table></div>");
      tableWrap.innerHTML = html.join("");
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>\"']/g, (s) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[s]));
    }

    function getVisiblePages(totalPages) {
      if (totalPages <= 7) {
        return Array.from({ length: totalPages }, (_, index) => index + 1);
      }

      const visible = new Set([1, 2, totalPages - 1, totalPages, page - 1, page, page + 1]);
      return Array.from(visible)
        .filter((value) => value >= 1 && value <= totalPages)
        .sort((a, b) => a - b);
    }

    function renderPager(totalPages) {
      prevBtn.disabled = page <= 1;
      nextBtn.disabled = page >= totalPages;

      const visiblePages = getVisiblePages(totalPages);
      const fragments = [];
      let previousPage = 0;

      for (const pageNumber of visiblePages) {
        if (previousPage && pageNumber - previousPage > 1) {
          fragments.push('<span class="ellipsis">...</span>');
        }

        fragments.push(
          `<button type="button" class="${pageNumber === page ? "is-active" : ""}" data-page="${pageNumber}">${pageNumber}</button>`
        );
        previousPage = pageNumber;
      }

      pageButtonsEl.innerHTML = fragments.join("");
      pageButtonsEl.querySelectorAll("button[data-page]").forEach((button) => {
        button.addEventListener("click", () => {
          const nextPageNumber = Number(button.dataset.page || "1");
          if (!Number.isNaN(nextPageNumber) && nextPageNumber !== page) {
            page = nextPageNumber;
            loadProducts();
          }
        });
      });
    }

    document.getElementById("searchBtn").addEventListener("click", () => {
      currentQuery = queryInput.value.trim();
      page = 1;
      loadProducts();
    });

    queryInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        currentQuery = queryInput.value.trim();
        page = 1;
        loadProducts();
      }
    });

    prevBtn.addEventListener("click", () => {
      if (page > 1) {
        page -= 1;
        loadProducts();
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalPages = Math.max(1, Math.ceil(lastTotal / pageSize));
      if (page < totalPages) {
        page += 1;
        loadProducts();
      }
    });

    loadProducts();
  </script>
</body>
</html>
