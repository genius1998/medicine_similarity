name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 32.236.113.89
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # 프로젝트 디렉토리 자동 탐색 (git remote가 medicine_similarity인 폴더)
            PROJECT_DIR=$(find /home/ubuntu /srv /opt /var/www 2>/dev/null -maxdepth 4 -name ".git" -type d \
              | xargs -I{} dirname {} \
              | xargs -I{} sh -c 'git -C {} remote get-url origin 2>/dev/null | grep -q "medicine_similarity" && echo {}' \
              | head -1)

            if [ -z "$PROJECT_DIR" ]; then
              echo "=== 탐색된 디렉토리 목록 (디버그) ==="
              ls /home/ubuntu/
              echo "ERROR: project directory not found" && exit 1
            fi

            echo "=== 프로젝트 경로: $PROJECT_DIR ==="
            cd "$PROJECT_DIR"

            echo "=== git pull ==="
            git pull origin main

            echo "=== install dependencies (if changed) ==="
            if [ -f ".venv/bin/activate" ]; then
              source .venv/bin/activate
              pip install -q -r requirements_api.txt
            fi

            echo "=== restart service ==="
            if systemctl list-units --type=service | grep -qE "medicine|uvicorn|api"; then
              SERVICE=$(systemctl list-units --type=service | grep -oE "[a-z_-]*(medicine|uvicorn|api)[a-z_-]*\.service" | head -1)
              echo "Restarting systemd service: $SERVICE"
              sudo systemctl restart "$SERVICE"
            else
              echo "No systemd service found. Restarting uvicorn process directly..."
              pkill -f "uvicorn api.main:app" || true
              sleep 1
              source .venv/bin/activate
              nohup uvicorn api.main:app --host 0.0.0.0 --port 8000 > logs/uvicorn.log 2>&1 &
              echo "uvicorn restarted (PID: $!)"
            fi

            echo "=== deploy complete ==="
