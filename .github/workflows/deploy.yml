name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run data-independent tests
        run: |
          python -m pytest \
            tests/test_ingredient_match_llm_client.py \
            tests/test_recommendation_quality_judge_batch.py \
            tests/test_similarity_weighting.py \
            -q

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ vars.EC2_APP_DIR || '/opt/medicine_similarity' }}"
            SERVICE_NAME="${{ vars.EC2_SERVICE || 'medicine-api' }}"

            # 1. 프로젝트 디렉토리
            cd "$APP_DIR"

            # 2. git pull
            echo "=== git pull ==="
            git pull origin main

            # 3. 의존성 설치
            echo "=== install dependencies ==="
            source .venv/bin/activate
            pip install -q -r requirements_api.txt

            # 4. 서비스 재시작
            echo "=== restart service ==="
            sudo systemctl restart "$SERVICE_NAME"
            sleep 3

            # 5. 정상 기동 확인
            if systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "=== deploy complete ==="
            else
              sudo journalctl -u "$SERVICE_NAME" -n 30 --no-pager
              exit 1
            fi
