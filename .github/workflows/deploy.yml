name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 32.236.113.89
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # 1. 프로젝트 디렉토리
            cd /opt/medicine_similarity

            # 2. git pull
            echo "=== git pull ==="
            git pull origin main

            # 3. 의존성 설치
            echo "=== install dependencies ==="
            source .venv/bin/activate
            pip install -q -r requirements_api.txt

            # 4. 서비스 재시작
            echo "=== restart service ==="
            sudo systemctl restart medicine-api
            sleep 3

            # 5. 정상 기동 확인
            if systemctl is-active --quiet medicine-api; then
              echo "=== deploy complete ==="
            else
              sudo journalctl -u medicine-api -n 30 --no-pager
              exit 1
            fi
