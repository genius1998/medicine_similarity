name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 32.236.113.89
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # 1. 프로젝트 디렉토리 탐색
            PROJECT_DIR=$(find /home/ubuntu /srv /opt /var/www 2>/dev/null -maxdepth 4 -name ".git" -type d \
              | xargs -I{} dirname {} \
              | xargs -I{} sh -c 'git -C {} remote get-url origin 2>/dev/null | grep -q "medicine_similarity" && echo {}' \
              | head -1)

            if [ -z "$PROJECT_DIR" ]; then
              echo "ERROR: project directory not found"
              ls /home/ubuntu/ || true
              exit 1
            fi
            echo "=== 프로젝트 경로: $PROJECT_DIR ==="
            cd "$PROJECT_DIR"

            # 2. git pull
            echo "=== git pull ==="
            git pull origin main

            # 3. 의존성 설치
            echo "=== install dependencies ==="
            if [ -f ".venv/bin/activate" ]; then
              source .venv/bin/activate
              pip install -q -r requirements_api.txt
            fi

            # 4. systemd 서비스가 없으면 자동 생성
            if ! systemctl list-unit-files 2>/dev/null | grep -q "medicine-api.service"; then
              echo "=== systemd 서비스 최초 등록 ==="
              UVICORN_BIN="$PROJECT_DIR/.venv/bin/uvicorn"

              sudo tee /etc/systemd/system/medicine-api.service > /dev/null <<EOF
            [Unit]
            Description=Medicine Similarity API
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=$PROJECT_DIR
            ExecStart=$UVICORN_BIN api.main:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target
            EOF

              sudo systemctl daemon-reload
              sudo systemctl enable medicine-api
              echo "=== 서비스 등록 완료 ==="
            fi

            # 5. 서비스 재시작
            echo "=== restart medicine-api ==="
            sudo systemctl restart medicine-api
            sleep 3

            echo "=== service status ==="
            sudo systemctl status medicine-api --no-pager || true

            echo "=== 최근 로그 (에러 원인 확인) ==="
            sudo journalctl -u medicine-api -n 50 --no-pager || true

            # 서비스가 실제로 running 상태인지 확인
            if ! systemctl is-active --quiet medicine-api; then
              echo "ERROR: medicine-api service failed to start. See logs above."
              exit 1
            fi

            echo "=== deploy complete ==="
